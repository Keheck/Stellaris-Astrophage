l_english:
  astrophage.2.title: "The Stars are Dimming"
  astrophage.2.desc: "What was at first written off as fringe conspiracy theories has turned out to be actually true: The stars seem to be dimming. Scientists across our colonies report an imperceptible dimming in their stars that nontheless mess with their energy generation and food production efforts. For now they can still cope, but urge to find the cause for this reduction in light output before their efforts are seriously hampered"
  astrophage.2.A: "We will see what we can do."